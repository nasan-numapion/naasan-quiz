<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>なぁさん生誕祭クイズ</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;800&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'M PLUS Rounded 1c',sans-serif;background:linear-gradient(135deg,#ffe0f0 0%,#ffd6f0 40%,#d6e8ff 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px;}
.wrap{width:100%;max-width:600px;background:linear-gradient(135deg,#ffe0f0 0%,#ffd6f0 40%,#d6e8ff 100%);border-radius:20px;padding:24px;box-shadow:0 8px 32px rgba(167,139,250,0.2);position:relative;overflow:hidden;}
.screen{display:none;}.screen.active{display:block;}
.title-logo{text-align:center;padding:16px 0 8px;}
.title-logo .main{font-size:22px;font-weight:800;color:#3b1d6e;line-height:1.4;}
.title-logo .sub{font-size:13px;color:#7c3aed;font-weight:700;margin-top:4px;}
.chara-img{position:absolute;bottom:0;right:0;width:120px;opacity:0.85;pointer-events:none;}
.name-card{background:rgba(255,255,255,0.8);border-radius:14px;padding:20px;margin:16px 0;}
.name-card label{font-size:14px;font-weight:800;color:#4c1d95;display:block;margin-bottom:8px;}
.name-input{width:100%;font-family:'M PLUS Rounded 1c',sans-serif;font-size:16px;font-weight:700;padding:10px 14px;border:2px solid #e0aaff;border-radius:10px;background:#fff;color:#3b1d6e;outline:none;}
.start-btn{display:block;width:100%;font-family:'M PLUS Rounded 1c',sans-serif;font-weight:800;font-size:17px;padding:14px;border-radius:999px;border:none;cursor:pointer;background:linear-gradient(90deg,#ff80b5,#a78bfa);color:#fff;margin-top:16px;}
.chara-quiz{position:absolute;bottom:0;right:8px;width:90px;opacity:0.75;pointer-events:none;}
.score-now-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;}
.score-label{font-size:12px;color:#7c3aed;font-weight:700;}
.score-now{font-size:14px;color:#a78bfa;font-weight:800;}
.progress-bar{background:rgba(255,255,255,0.5);border-radius:999px;height:10px;margin-bottom:6px;}
.progress-fill{background:linear-gradient(90deg,#ff80b5,#a78bfa);border-radius:999px;height:10px;transition:width 0.5s;}
.progress-text{font-size:13px;color:#7c3aed;font-weight:700;text-align:right;margin-bottom:12px;}
.q-row{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.question-badge{display:inline-block;background:#ff80b5;color:#fff;font-size:13px;font-weight:800;padding:4px 14px;border-radius:999px;}
.point-badge{display:inline-block;color:#fff;font-size:13px;font-weight:800;padding:4px 14px;border-radius:999px;}
.pt-normal{background:#a78bfa;}.pt-special{background:#f59e0b;}.pt-final{background:#ef4444;}
.question-text{font-size:16px;font-weight:800;color:#3b1d6e;line-height:1.5;margin-bottom:16px;background:rgba(255,255,255,0.7);border-radius:12px;padding:14px 16px;}
.choices{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
.choice{background:rgba(255,255,255,0.85);border:2px solid #e0aaff;border-radius:12px;padding:11px 12px;font-size:13px;font-weight:700;color:#4c1d95;cursor:pointer;display:flex;align-items:center;gap:8px;}
.choice.selected{background:#fce7f3;border-color:#f472b6;}
.choice.correct{background:#d1fae5;border-color:#10b981;color:#065f46;cursor:default;}
.choice.wrong{background:#fee2e2;border-color:#ef4444;color:#991b1b;cursor:default;}
.choice.reveal{background:#f3e8ff;border-color:#a78bfa;color:#4c1d95;cursor:default;}
.choice-label{background:#a78bfa;color:#fff;border-radius:6px;width:24px;height:24px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;flex-shrink:0;}
.choice.correct .choice-label{background:#10b981;}.choice.wrong .choice-label{background:#ef4444;}
.result-msg{text-align:center;font-size:15px;font-weight:800;min-height:22px;color:#7c3aed;margin-bottom:12px;}
.btn-row{display:flex;justify-content:center;}
.btn{font-family:'M PLUS Rounded 1c',sans-serif;font-weight:800;font-size:15px;padding:10px 28px;border-radius:999px;border:none;cursor:pointer;}
.btn-ans{background:#ff80b5;color:#fff;}.btn-next{background:#a78bfa;color:#fff;display:none;}
.result-card{background:rgba(255,255,255,0.85);border-radius:16px;padding:24px;text-align:center;margin:8px 0;}
.result-name{font-size:15px;font-weight:800;color:#7c3aed;margin-bottom:4px;}
.result-score{font-size:52px;font-weight:800;color:#3b1d6e;line-height:1.1;}
.result-max{font-size:14px;color:#a78bfa;font-weight:700;margin-bottom:12px;}
.result-rank{font-size:18px;font-weight:800;color:#7c3aed;margin-bottom:4px;}
.result-comment{font-size:13px;color:#6d28d9;font-weight:700;margin-bottom:20px;}
.share-btn{display:block;width:100%;font-family:'M PLUS Rounded 1c',sans-serif;font-weight:800;font-size:15px;padding:12px;border-radius:999px;border:none;cursor:pointer;background:#1d9bf0;color:#fff;margin-bottom:10px;}
.retry-btn{display:block;width:100%;font-family:'M PLUS Rounded 1c',sans-serif;font-weight:800;font-size:15px;padding:12px;border-radius:999px;border:2px solid #a78bfa;background:transparent;color:#7c3aed;cursor:pointer;}
</style>
</head>

  {q:"なぁさんは自分の話し方についてどう思っている？",choices:["訛ってるのは自覚してる","ちょっと訛ってると思う","標準語で話しているつもり","訛りを意図的に出している"],ans:2,pt:5},
  {q:"なぁさんが「余裕～♪」と言った後どうなる？",choices:["本当に余裕でクリアする","だいたい余裕でクリアする","全然余裕じゃないことが多い","そもそも余裕とは言わない"],ans:2,pt:5},
  {q:"なぁさんのモデレーター・あきかんさんの自称は？",choices:["影廊の民","ゼルダの民","バイオの民","修羅の民"],ans:1,pt:5},
  {q:"なぁさんの年内のチャンネル登録者数目標は？",choices:["800人","1000人","1万人","特に決めていない"],ans:0,pt:5},
  {q:"なぁさんの出身地は？",choices:["秋田","青森","鹿児島","沖縄"],ans:1,pt:5},
  {q:"なぁさんが成功した時のリスナーの掛け声は？",choices:["調子悪いのか？","チッ","撮れ高ないぞ！","そんなんでいいのか？"],ans:1,pt:15},
  {q:"リスナーに「〇〇できますよ」と言われたなぁさんがよくやることは？",choices:["疑って試さない","半信半疑で試す","信じてそのままやって罠にはまる","逆に罠を仕掛け返す"],ans:2,pt:5},
  {q:"なぁさんが暴言を吐くことは？",choices:["ほぼ毎配信ある","週に数回はある","稀にある","一切ない"],ans:2,pt:5},
  {q:"なぁさんが配信でモットーにしていることは？",choices:["沼になるようにわざとプレイしている","毎回違うゲームをプレイする","誰でも会話に入れる配信をする","極力台本通りな配信をする"],ans:2,pt:5},
  {q:"なぁさんがリスナーのお誕生日にしてくれることは？",choices:["プレゼントを送る","特別配信をする","歌ってお祝いする","お手紙を読む"],ans:2,pt:5},
  {q:"【ファイナル】配信をしっかり始めようと思ったゲームは？",choices:["Phasmophobia","Dead by Daylight","Shadow Corridor","ゼルダの伝説 BREATH OF THE WILD"],ans:2,pt:20}
];
var labels=["A","B","C","D"];
var cur=0,selected=-1,revealed=false,score=0,playerName="";
function startQuiz(){
  playerName=document.getElementById('name-input').value.trim()||"名無しさん";
  cur=0;score=0;show('s-quiz');render();
}
function show(id){
  var screens=document.querySelectorAll('.screen');
  for(var i=0;i<screens.length;i++)screens[i].classList.remove('active');
  document.getElementById(id).classList.add('active');
}
function render(){
  var q=questions[cur];
  document.getElementById('q-badge').textContent='Q'+(cur+1);
  var pb=document.getElementById('p-badge');
  pb.textContent=q.pt+'点';
  pb.className='point-badge '+(q.pt===20?'pt-final':q.pt===15?'pt-special':'pt-normal');
  document.getElementById('q-text').textContent=q.q;
  document.getElementById('prog-text').textContent='第'+(cur+1)+'問 / '+questions.length+'問';
  document.getElementById('prog').style.width=((cur+1)/questions.length*100)+'%';
  document.getElementById('score-now').textContent=score+'点';
  var ch=document.getElementById('choices');
  ch.innerHTML='';
  for(var i=0;i<q.choices.length;i++){
    (function(idx){
      var d=document.createElement('div');
      d.className='choice';
      d.innerHTML='<span class="choice-label">'+labels[idx]+'</span>'+q.choices[idx];
      d.onclick=function(){select(idx);};
      ch.appendChild(d);
    })(i);
  }
  document.getElementById('btn-ans').style.display='inline-block';
  document.getElementById('btn-next').style.display='none';
  document.getElementById('result-msg').textContent='';
  selected=-1;revealed=false;
}
function select(i){
  if(revealed)return;
  selected=i;
  var ch=document.getElementById('choices').children;
  for(var j=0;j<ch.length;j++)ch[j].className='choice';
  ch[i].className='choice selected';
}
function reveal(){
  if(revealed)return;
  revealed=true;
  var q=questions[cur];
  var ch=document.getElementById('choices').children;
  for(var i=0;i<ch.length;i++){
    if(i===q.ans)ch[i].className='choice correct';
    else if(i===selected&&i!==q.ans)ch[i].className='choice wrong';
    else ch[i].className='choice reveal';
  }
  var msg=document.getElementById('result-msg');
  if(selected===q.ans){score+=q.pt;msg.textContent='⭐ 正解！ +'+q.pt+'点';}
  else if(selected===-1){msg.textContent='正解は '+labels[q.ans]+' でした！';}
  else{msg.textContent='不正解… 正解は '+labels[q.ans]+' でした！';}
  document.getElementById('score-now').textContent=score+'点';
  document.getElementById('btn-ans').style.display='none';
  if(cur<questions.length-1){document.getElementById('btn-next').style.display='inline-block';}
  else{setTimeout(showResult,1200);}
}
function nextQ(){cur++;render();}
function getRank(s){
  if(s>=90)return{rank:"🏆 なぁさん博士",comment:"満点クラス！完璧ななぁさん通！"};
  if(s>=75)return{rank:"⭐ 上級リスナー",comment:"かなり詳しい！常連さんですね！"};
  if(s>=55)return{rank:"🎮 中級リスナー",comment:"なかなか！もっと配信見てね👀"};
  if(s>=30)return{rank:"🌱 見習いリスナー",comment:"これから一緒に沼にハマろう！"};
  return{rank:"👋 はじめましての方？",comment:"ぜひ配信に遊びに来てね！"};
}
function showResult(){
  var r=getRank(score);
  document.getElementById('r-name').textContent=playerName+'さんの結果';
  document.getElementById('r-score').textContent=score;
  document.getElementById('r-rank').textContent=r.rank;
  document.getElementById('r-comment').textContent=r.comment;
  var url=GAS_URL+'?name='+encodeURIComponent(playerName)+'&score='+encodeURIComponent(String(score))+'&rank='+encodeURIComponent(r.rank);
  var xhr=new XMLHttpRequest();
  xhr.open('GET',url,true);
  xhr.send();
  show('s-result');
}
function shareX(){
  var r=getRank(score);
  var text='🎂 なぁさん生誕祭クイズに挑戦したよ！\n\n'+playerName+'の結果：'+score+'点 / 100点満点\n'+r.rank+'\n\n#なぁさん生誕祭 #なぁさんは沼ゲーマー';
  window.open('https://twitter.com/intent/tweet?text='+encodeURIComponent(text));
}
function goTitle(){show('s-title');document.getElementById('name-input').value='';}
</script>
